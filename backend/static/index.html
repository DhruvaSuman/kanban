<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP Hello</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        color: #032147;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(640px, 100%);
        background: #fff;
        border: 1px solid #e7e8ef;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 6px 24px rgba(3, 33, 71, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        color: #032147;
      }
      p {
        margin: 0;
        color: #555;
      }
      code {
        color: #753991;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Hello from FastAPI</h1>
        <p>Static HTML is served at <code>/</code>.</p>
        <p>Try API endpoints <code>/api/health</code> and <code>/api/hello</code>.</p>
      </section>
    </main>
  </body>
</html>
